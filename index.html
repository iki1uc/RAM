<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>RAM 81-Würfel</title>
  <style>
    body {
      background: #111;
      color: #0ff;
      font-family: monospace;
      padding: 40px;
      font-size: 22px;
    }
    .ram {
      border: 2px solid #0ff;
      padding: 20px;
      width: 480px;
    }
    .stat {
      margin-top: 20px;
      color: #0f0;
    }
  </style>
</head>

<body>

<div class="ram">
  <div>RAM ONLINE</div>
  <div>System: RAM-200</div>
  <div>Status: aktiv</div>

  <!-- 81-Würfel Anzeige -->
  <div class="stat">Würfel gesamt: 81</div>
  <div class="stat">Würfel aktiv: 9</div>
  <div class="stat">Würfel reserviert: 12</div>
  <div class="stat">Würfel frei: 60</div>

  <div class="stat">RAM zeigt Würfel-Status (minimal)</div>
</div>

</body>
</html>
